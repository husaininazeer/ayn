baseURL = ""
# title = "ayn"
author = "huscous"
copyright = "Copyright © 2023- huscous; all rights reserved."
paginate = 7
languageCode = "en"
DefaultContentLanguage = "en"
enableInlineShortcodes = true
# prevent build failures when using Hugo's Instagram shortcode due to deprecated Instagram API.
# See https://github.com/gohugoio/hugo/issues/7228#issuecomment-714490456
ignoreErrors = ["error-remote-getjson"]

# ------------------------------
theme = "paper"
title = "ayn"

[params]
  color = 'linen'                                       # linen, wheat, gray, light

  twitter = 'huscous'
  github = 'husaininazeer'
  # instagram = ''

  # avatar = 'https://upload.wikimedia.org/wikipedia/commons/9/91/06-H.a.svg'
  name = 'huscous'
  bio = 'notes dump'
# ------------------------------

# needed to  render raw HTML (e.g. <sub>, <sup>, <kbd>, <mark>)
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 10

  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 10

[taxonomies]
category = "categories"
tag = "tags"
series = "series"

